name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - refactor-v1

jobs:
  test:
    name: Test template
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend dependencies
        run: make install

      - name: Run backend checks
        run: |
          make lint
          make test
          make validate-addons

      - name: Check Odoo health fallback
        run: env ODOO_DB= ODOO_USER= ODOO_API_KEY= make odoo-health

      - name: Validate Docker Compose
        run: docker compose --env-file .env.example config

      - name: Build Odoo image
        run: docker compose --env-file .env.example build

      - name: Smoke test Odoo stack
        run: |
          docker compose --env-file .env.example -p arcvo-ci up -d --wait
          docker compose --env-file .env.example -p arcvo-ci ps

      - name: Stop Odoo stack
        if: always()
        run: docker compose --env-file .env.example -p arcvo-ci down -v
